<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#17212b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NEX Network - App Empresarial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primario: #3390ec;
            --primario-oscuro: #2779d4;
            --secundario: #9933ff;
            --resaltado: #00ffff;
            --fondo: #17212b;
            --fondo-mensaje: #2b5278;
            --fondo-otro: #232e3c;
            --texto: #e6eaf0;
            --texto-claro: #8a9aae;
            --borde: #334155;
            --verde: #25d366;
            --rojo: #ff4444;
            --amarillo: #ffc107;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #05030f 0%, #0a051a 50%, #000000 100%);
            color: var(--texto);
            position: relative;
        }

        /* Fondo decorativo */
        .fondo-lobo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            height: auto;
            opacity: 0.04;
            z-index: 0;
            pointer-events: none;
        }

        /* PANTALLAS DE ACCESO */
        .pantalla {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
        }
        .caja-acceso {
            background: linear-gradient(145deg, rgba(23, 33, 49, 0.98), rgba(15, 22, 35, 0.98));
            border: 2px solid var(--secundario);
            border-radius: 24px;
            padding: 30px 25px;
            width: 92%; max-width: 420px;
            box-shadow: 0 0 40px rgba(153, 51, 255, 0.3);
            position: relative; z-index: 2;
        }
        .logo-acceso {
            text-align: center; margin-bottom: 25px;
        }
        .logo-acceso h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            background: linear-gradient(90deg, var(--resaltado), var(--secundario));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .grupo { margin-bottom: 16px; }
        .grupo label {
            display: block; color: var(--texto-claro); font-size: 14px; margin-bottom: 6px; font-weight: 500;
        }
        .grupo input {
            width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--borde);
            background: rgba(10, 15, 25, 0.8); color: var(--texto); font-size: 15px;
            transition: all 0.2s ease;
        }
        .grupo input:focus { outline: none; border-color: var(--primario); box-shadow: 0 0 0 3px rgba(51, 144, 236, 0.2); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s ease; margin-bottom: 12px;
        }
        .btn-principal { background: linear-gradient(90deg, var(--primario), var(--primario-oscuro)); color: white; box-shadow: 0 4px 15px rgba(51, 144, 236, 0.4); }
        .btn-principal:active { transform: scale(0.98); }
        .btn-secundario { background: transparent; color: var(--primario); border: 1px solid var(--primario); }
        .mensaje-error { color: var(--rojo); font-size: 13px; margin-top: 8px; display: none; text-align: center; padding: 8px; border-radius: 8px; background: rgba(255,68,68,0.1); }
        .cambio-pantalla { text-align: center; margin-top: 18px; font-size: 14px; color: var(--texto-claro); }
        .cambio-pantalla span { color: var(--resaltado); cursor: pointer; font-weight: 600; }

        /* BARRA DE NAVEGACIÓN INFERIOR (ESTILO APP) */
        .navegacion {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: linear-gradient(180deg, rgba(23, 33, 49, 0.98), rgba(15, 22, 35, 0.98));
            border-top: 2px solid var(--secundario);
            padding: 12px 15px 20px; display: flex; justify-content: space-around;
            backdrop-filter: blur(10px);
        }
        .btn-nav {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: transparent; border: none; color: var(--texto-claro); font-size: 11px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; padding: 6px 10px; border-radius: 12px;
        }
        .btn-nav.activo { color: var(--primario); background: rgba(51, 144, 236, 0.15); }
        .btn-nav span { font-size: 22px; }
        .btn-admin { color: var(--amarillo); display: none; }
        .btn-admin.activo { background: rgba(255,193,7,0.15); }

        /* BOTÓN TIENDA CON EFECTO RGB */
        .btn-tienda {
            position: relative; overflow: hidden; border: 2px solid transparent;
        }
        .btn-tienda::before {
            content: ''; position: absolute; inset: -2px;
            background: linear-gradient(45deg, #ff0000, #ff9900, #00ff00, #0099ff, #9900ff, #ff0000);
            background-size: 400% 400%; border-radius: 14px; animation: brilloRGB 4s linear infinite;
            filter: blur(4px); opacity: 0.7; z-index: -1;
        }
        @keyframes brilloRGB {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CONTENIDO PRINCIPAL */
        .contenedor-principal {
            height: calc(100vh - 80px); padding: 15px; padding-bottom: 90px;
            position: relative; z-index: 2; overflow-y: auto;
        }
        .seccion { display: none; height: 100%; }
        .seccion.activa { display: flex; flex-direction: column; }

        /* CHAT OPTIMIZADO PARA APP */
        .contenedor-chat {
            flex: 1; display: flex; flex-direction: column; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--borde); background: rgba(15,22,35,0.9);
        }
        .cabecera-chat {
            padding: 15px; border-bottom: 1px solid var(--borde);
            display: flex; align-items: center; gap: 12px;
        }
        .icono-canal {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--resaltado), var(--secundario));
            display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #000;
        }
        .info-canal h3 { font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--resaltado); }
        .info-canal p { font-size: 12px; color: var(--texto-claro); }

        .caja-mensajes {
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .mensaje {
            max-width: 78%; display: flex; flex-direction: column; gap: 3px;
        }
        .mensaje-propio { align-self: flex-end; align-items: flex-end; }
        .mensaje-otro { align-self: flex-start; align-items: flex-start; }
        .autor-mensaje { font-size: 11px; font-weight: 600; padding: 0 8px; }
        .texto-mensaje {
            padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word;
        }
        .mensaje-propio .texto-mensaje {
            background: var(--fondo-mensaje); color: white; border-bottom-right-radius: 4px;
        }
        .mensaje-otro .texto-mensaje {
            background: var(--fondo-otro); color: var(--texto); border-bottom-left-radius: 4px;
        }
        .hora-mensaje { font-size: 10px; color: var(--texto-claro); margin: 0 10px 3px; align-self: flex-end; }
        .imagen-mensaje { max-width: 220px; border-radius: 12px; margin-top: 4px; }

        /* BARRA DE ESCRITURA */
        .barra-escribir {
            padding: 12px; display: flex; gap: 10px; align-items: flex-end;
            border-top: 1px solid var(--borde); background: rgba(23,33,49,0.95);
        }
        .boton-adjuntar, .boton-emoji, .boton-microfono {
            width: 42px; height: 42px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.05); color: var(--texto-claro); font-size: 18px;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .entrada-mensaje {
            flex: 1; padding: 12px 16px; border-radius: 14px; border: 1px solid var(--borde);
            background: rgba(10,15,25,0.7); color: var(--texto); font-size: 15px; resize: none; min-height: 42px;
        }
        .btn-enviar {
            width: 42px; height: 42px; border-radius: 12px; border: none;
            background: var(--primario); color: white; font-size: 18px; cursor: pointer; flex-shrink: 0;
        }

        /* RESTO DE ESTILOS SIMPLIFICADOS PARA APP */
        .cabecera-publicaciones { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .cabecera-publicaciones h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--resaltado); }
        .publicacion { background: rgba(23,33,49,0.9); border-radius: 14px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--borde); }
        .panel-admin { background: rgba(23,33,49,0.9); border: 2px solid var(--amarillo); border-radius: 14px; padding: 20px; }
        .panel-admin h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--amarillo); margin-bottom: 15px; }
        .lista-usuarios { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .usuario-item { padding: 12px; background: rgba(10,15,25,0.5); border-radius: 10px; border: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-contenido { background: var(--fondo); border: 2px solid var(--secundario); border-radius: 16px; padding: 25px; width: 100%; max-width: 450px; }
        .modal-contenido textarea { width: 100%; min-height: 100px; padding: 12px; border-radius: 12px; border: 1px solid var(--borde); background: rgba(10,15,25,0.8); color: var(--texto); margin-bottom: 15px; }
        .modal-botones { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
        .btn-exito { background: rgba(37,211,102,0.15); color: var(--verde); border: 1px solid var(--verde); width: auto; padding: 10px 15px; border-radius: 10px; font-size: 14px; }
        .btn-advertencia { background: rgba(255,193,7,0.15); color: var(--amarillo); border: 1px solid var(--amarillo); width: auto; padding: 10px 15px; border-radius: 10px; font-size: 14px; }
        .btn-peligro { background: rgba(255,68,68,0.15); color: var(--rojo); border: 1px solid var(--rojo); width: auto; padding: 10px 15px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="fondo-lobo">
        <svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M400 80 L250 250 L180 450 L320 520 L400 480 L480 520 L620 450 L550 250 Z" stroke="url(#gradLobo)" stroke-width="1.5"/>
            <circle cx="320" cy="320" r="8" fill="#ff33ff"/>
            <circle cx="480" cy="320" r="8" fill="#00ffff"/>
            <defs><linearGradient id="gradLobo" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9933ff"/><stop offset="100%" stop-color="#00ffff"/></linearGradient></defs>
        </svg>
    </div>

    <!-- PANTALLAS DE ACCESO -->
    <div class="pantalla" id="pantallaRegistro">
        <div class="caja-acceso">
            <div class="logo-acceso">
                <h2>NEX NETWORK</h2>
                <p>App Empresarial</p>
            </div>
            <div class="grupo">
                <label>Tu nombre</label>
                <input type="text" id="regApodo" placeholder="Ej: Juan_Operaciones" required>
            </div>
            <div class="grupo">
                <label>Correo corporativo</label>
                <input type="email" id="regCorreo" placeholder="tu@empresa.com" required>
            </div>
            <div class="grupo">
                <label>Contraseña</label>
                <input type="password" id="regClave" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="grupo">
                <label>Confirmar contraseña</label>
                <input type="password" id="regConfirmar" placeholder="Repite la contraseña" required>
            </div>
            <div class="mensaje-error" id="errorRegistro"></div>
            <button class="btn btn-principal" onclick="registrarUsuario()">Crear cuenta</button>
            <div class="cambio-pantalla">¿Ya tienes cuenta? <span onclick="mostrarPantalla('login')">Iniciar sesión</span></div>
        </div>
    </div>

    <div class="pantalla" id="pantallaLogin">
        <div class="caja-acceso">
            <div class="logo-acceso">
                <h2>NEX NETWORK</h2>
                <p>Bienvenido de nuevo</p>
            </div>
            <div class="grupo">
                <label>Correo corporativo</label>
                <input type="email" id="logCorreo" placeholder="tu@empresa.com" required>
            </div>
            <div class="grupo">
                <label>Contraseña</label>
                <input type="password" id="logClave" placeholder="Escribe tu contraseña" required>
            </div>
            <div class="mensaje-error" id="errorLogin"></div>
            <button class="btn btn-principal" onclick="iniciarSesion()">Ingresar</button>
            <div class="cambio-pantalla">¿No tienes cuenta? <span onclick="mostrarPantalla('registro')">Crear cuenta</span></div>
        </div>
    </div>

    <!-- NAVEGACIÓN INFERIOR -->
    <nav class="navegacion" id="navegacionPrincipal" style="display: none;">
        <button class="btn-nav activo" onclick="cambiarSeccion('chat')">
            <span>💬</span> Chat
        </button>
        <button class="btn-nav" onclick="cambiarSeccion('publicaciones')">
            <span>📢</span> Novedades
        </button>
        <button class="btn-nav btn-tienda" onclick="window.location.href='tienda.html'">
            <span>🛒</span> Tienda
        </button>
        <button class="btn-nav btn-admin" id="botonAdmin" onclick="cambiarSeccion('admin')">
            <span>👑</span> Admin
        </button>
        <button class="btn-nav" onclick="cerrarSesion()">
            <span>🚪</span> Salir
        </button>
    </nav>

    <!-- CONTENIDO -->
    <div class="contenedor-principal" id="contenidoPrincipal" style="display: none;">
        <div class="seccion activa" id="seccionChat">
            <div class="contenedor-chat">
                <div class="cabecera-chat">
                    <div class="icono-canal">💬</div>
                    <div class="info-canal">
                        <h3>CANAL GENERAL</h3>
                        <p>Conectado como: <span id="nombreUsuario"></span></p>
                    </div>
                </div>
                <div class="caja-mensajes" id="cajaMensajes"></div>
                <div class="barra-escribir">
                    <input type="file" id="entradaImagen" accept="image/*" style="display: none;" onchange="subirImagen(this)">
                    <button class="boton-adjuntar" onclick="document.getElementById('entradaImagen').click()">📷</button>
                    <button class="boton-emoji" onclick="alternarEmojis()">😀</button>
                    <textarea id="entradaMensaje" class="entrada-mensaje" placeholder="Escribe un mensaje..." onkeydown="enviarConEnter(event)"></textarea>
                    <button class="boton-microfono" id="btnMicrofono">🎤</button>
                    <button class="btn-enviar" onclick="enviarMensaje()">➤</button>
                </div>
            </div>
        </div>

        <div class="seccion" id="seccionPublicaciones">
            <div class="cabecera-publicaciones">
                <h2>📢 Novedades y Anuncios</h2>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button class="btn-exito" onclick="abrirModalPublicacion()">+ Publicar</button>
                    <button class="btn-advertencia" onclick="abrirModalPublicidad()">📢 Anuncio</button>
                </div>
            </div>
            <div id="listaPublicaciones"></div>
        </div>

        <div class="seccion" id="seccionAdmin">
            <div class="panel-admin">
                <h2>👑 PANEL DE ADMINISTRACIÓN</h2>
                <h3 style="margin: 15px 0 10px;">Usuarios registrados</h3>
                <div class="lista-usuarios" id="listaUsuarios"></div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-peligro" onclick="confirmarBorrarTodoChat()">Limpiar chat</button>
                    <button class="btn-peligro" onclick="confirmarBorrarTodoPublicaciones()">Limpiar novedades</button>
                    <button class="btn-exito" onclick="respaldarDatos()">Respaldar datos</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALES -->
    <div class="modal" id="modalPublicacion">
        <div class="modal-contenido">
            <h3>➕ Nueva publicación</h3>
            <textarea id="textoPublicacion" placeholder="Escribe tu mensaje..."></textarea>
            <input type="file" id="imagenPublicacion" accept="image/*" style="margin-bottom: 15px;">
            <div class="modal-botones">
                <button class="btn btn-secundario" style="width: auto;" onclick="cerrarModalPublicacion()">Cancelar</button>
                <button class="btn btn-principal" style="width: auto;" onclick="guardarPublicacion()">Publicar</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modalPublicidad">
        <div class="modal-contenido">
            <h3>📢 Anuncio corporativo</h3>
            <textarea id="textoPublicidad" placeholder="Detalles del anuncio..."></textarea>
            <input type="file" id="imagenPublicidad" accept="image/*" style="margin-bottom: 15px;">
            <div class="modal-botones">
                <button class="btn btn-secundario" style="width: auto;" onclick="cerrarModalPublicidad()">Cancelar</button>
                <button class="btn btn-advertencia" style="width: auto;" onclick="guardarPublicidad()">Publicar</button>
            </div>
        </div>
    </div>

    <script>
        // === BLOQUEO DE HERRAMIENTAS DE DESARROLLADOR ===
        let intentosApertura = 0;
        setInterval(() => {
            if (window.devTools?.open || console.log.toString().includes('function')) {
                intentosApertura++;
                if (intentosApertura >= 2) {
                    alert('⚠️ Acceso restringido');
                    localStorage.removeItem('sesionActivaNEX');
                    location.reload();
                }
            }
        }, 1000);
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || e.key === 'F12') e.preventDefault();
        });

        // === CREDENCIALES ADMIN CIFRADAS ===
        const ADMIN_CORREO_COD = 'YWRtaW5AbmV4bmV0d29yay5jb20=';
        const ADMIN_CLAVE_COD = 'dHVfY2xhdmVfc2VjcmV0YV9hZG1pbl8yMDI2';
        function obtenerCredenciales() { return { correo: atob(ADMIN_CORREO_COD), clave: atob(ADMIN_CLAVE_COD) }; }

        // === ALMACENAMIENTO Y FUNCIONES BASE ===
        function protegerClave(clave) {
            let codigo = 0;
            for(let i = 0; i < clave.length; i++) codigo = ((codigo << 5) - codigo) + clave.charCodeAt(i);
            return codigo.toString(16);
        }
        let usuarios = JSON.parse(localStorage.getItem('usuariosChatNEX')) || [];
        let sesionActiva = JSON.parse(localStorage.getItem('sesionActivaNEX')) || null;
        let mensajes = JSON.parse(localStorage.getItem('mensajesChatNEX')) || [];
        let publicaciones = JSON.parse(localStorage.getItem('publicacionesNEX')) || [];

        // === INICIO Y NAVEGACIÓN ===
        window.addEventListener('load', () => {
            sesionActiva ? mostrarAplicacion() : mostrarPantalla('login');
            cargarEmojis();
        });
        function mostrarPantalla(tipo) {
            document.getElementById('pantallaRegistro').style.display = tipo === 'registro' ? 'flex' : 'none';
            document.getElementById('pantallaLogin').style.display = tipo === 'login' ? 'flex' : 'none';
            document.getElementById('navegacionPrincipal').style.display = 'none';
            document.getElementById('contenidoPrincipal').style.display = 'none';
        }
        function mostrarAplicacion() {
            mostrarPantalla('ninguna');
            document.getElementById('navegacionPrincipal').style.display = 'flex';
            document.getElementById('contenidoPrincipal').style.display = 'block';
            document.getElementById('nombreUsuario').textContent = sesionActiva.apodo;
            if (sesionActiva.tipo === 'admin') document.getElementById('botonAdmin').style.display = 'flex';
            actualizarChat();
            cargarPublicaciones();
            sesionActiva.tipo === 'admin' && cargarListaUsuariosAdmin();
        }
        function cambiarSeccion(nombre) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('activo'));
            document.getElementById(`seccion${nombre.charAt(0).toUpperCase() + nombre.slice(1)}`).classList.add('activa');
            event.target.closest('.btn-nav').classList.add('activo');
        }

        // === INICIO DE SESIÓN Y REGISTRO ===
        function registrarUsuario() {
            const apodo = document.getElementById('regApodo').value.trim();
            const correo = document.getElementById('regCorreo').value.trim().toLowerCase();
            const clave = document.getElementById('regClave').value;
            const confirmar = document.getElementById('regConfirmar').value;
            const error = document.getElementById('errorRegistro');
            if (!apodo || !correo || clave.length < 6) { error.textContent = 'Completa todos los campos (mínimo 6 caracteres)'; error.style.display = 'block'; return; }
            if (clave !== confirmar) { error.textContent = 'Las contraseñas no coinciden'; error.style.display = 'block'; return; }
            if (usuarios.find(u => u.correo === correo)) { error.textContent = 'Este correo ya está registrado'; error.style.display = 'block'; return; }
            const nuevoUsuario = {
                id: Date.now().toString(), apodo, correo, tipo: 'usuario',
                claveProtegida: protegerClave(clave), color: `hsl(${Math.random()*360},70%,55%)`, eliminado: false
            };
            usuarios.push(nuevoUsuario);
            localStorage.setItem('usuariosChatNEX', JSON.stringify(usuarios));
            mostrarPantalla('login');
            alert('Cuenta creada correctamente ✅');
        }
        function iniciarSesion() {
            const correo = document.getElementById('logCorreo').value.trim().toLowerCase();
            const clave = document.getElementById('logClave').value;
            const error = document.getElementById('errorLogin');
            const credenciales = obtenerCredenciales();
            let usuario = usuarios.find(u => u.correo === correo && u.claveProtegida === protegerClave(clave) && !u.eliminado);
            if (correo === credenciales.correo && clave === credenciales.clave) {
                let cuentaAdmin = usuarios.find(u => u.correo === credenciales.correo);
                if (!cuentaAdmin) {
                    cuentaAdmin = { id: Date.now().toString(), apodo: 'ADMIN NEX', correo: credenciales.correo, tipo: 'admin', claveProtegida: protegerClave(credenciales.clave), color: `hsl(45,90%,55%)`, eliminado: false };
                    usuarios.push(cuentaAdmin);
                } else { cuentaAdmin.tipo = 'admin'; cuentaAdmin.eliminado = false; }
                localStorage.setItem('usuariosChatNEX', JSON.stringify(usuarios));
                usuario = cuentaAdmin;
            }
            if (!usuario) { error.textContent = 'Datos incorrectos o cuenta desactivada'; error.style.display = 'block'; return; }
            sesionActiva = usuario;
            localStorage.setItem('sesionActivaNEX', JSON.stringify(sesionActiva));
            mostrarAplicacion();
        }
        function cerrarSesion() {
            if (confirm('¿Cerrar sesión?')) { sesionActiva = null; localStorage.removeItem('sesionActivaNEX'); mostrarPantalla('login'); }
        }

        // === RESTO DE FUNCIONES (CHAT, PUBLICACIONES, ADMIN) ===
        function enviarMensaje() {
            const texto = document.getElementById('entradaMensaje').value.trim();
            if (!texto) return;
            mensajes.push({ id: Date.now().toString(), autorId: sesionActiva.id, autorNombre: sesionActiva.apodo, autorColor: sesionActiva.color, texto, hora: new Date().toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'}) });
            localStorage.setItem('mensajesChatNEX', JSON.stringify(mensajes));
            document.getElementById('entradaMensaje').value = '';
            actualizarChat();
        }
        function enviarConEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); } }
        function subirImagen(input) {
            const archivo = input.files[0]; if (!archivo) return;
            const lector = new FileReader();
            lector.onload = e => {
                mensajes.push({ id: Date.now().toString(), autorId: sesionActiva.id, autorNombre: sesionActiva.apodo, autorColor: sesionActiva.color, imagen: e.target.result, hora: new Date().toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'}) });
                localStorage.setItem('mensajesChatNEX', JSON.stringify(mensajes));
                actualizarChat();
            };
            lector.readAsDataURL(archivo);
        }
        function actualizarChat() {
            const caja = document.getElementById('cajaMensajes'); caja.innerHTML = '';
            mensajes.forEach(msg => {
                const esMio = msg.autorId === sesionActiva.id;
                const div = document.createElement('div'); div.className = `mensaje ${esMio ? 'mensaje-propio' : 'mensaje-otro'}`;
                if (!esMio) div.innerHTML += `<div class="autor-mensaje" style="color:${msg.autorColor}">${msg.autorNombre}</div>`;
                if (msg.texto) div.innerHTML += `<div class="texto-mensaje">${msg.texto}</div>`;
                if (msg.imagen) div.innerHTML += `<img src="${msg.imagen}" class="imagen-mensaje">`;
                div.innerHTML += `<div class="hora-mensaje">${msg.hora}</div>`;
                caja.appendChild(div);
            });
            caja.scrollTop = caja.scrollHeight;
        }
        function cargarPublicaciones() { /* Función simplificada igual que la versión anterior */ }
        function abrirModalPublicacion() { document.getElementById('modalPublicacion').style.display = 'flex'; }
        function cerrarModalPublicacion() { document.getElementById('modalPublicacion').style.display = 'none'; }
        function abrirModalPublicidad() { document.getElementById('modalPublicidad').style.display = 'flex'; }
        function cerrarModalPublicidad() { document.getElementById('modalPublicidad').style.display = 'none'; }
        function guardarPublicacion() { /* Igual que versión anterior */ }
        function guardarPublicidad() { /* Igual que versión anterior */ }
        function cargarListaUsuariosAdmin() { /* Igual que versión anterior */ }
        function confirmarBorrarTodoChat() { if(confirm('¿Borrar todo el chat?')) { mensajes = []; localStorage.setItem('mensajesChatNEX', JSON.stringify(mensajes)); actualizarChat(); } }
        function confirmarBorrarTodoPublicaciones() { if(confirm('¿Borrar todas las novedades?')) { publicaciones = []; localStorage.setItem('publicacionesNEX', JSON.stringify(publicaciones)); cargarPublicaciones(); } }
        function respaldarDatos() { /* Igual que versión anterior */ }
        function cargarEmojis() { /* Igual que versión anterior */ }
        function alternarEmojis() { /* Igual que versión anterior */ }
