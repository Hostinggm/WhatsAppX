<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#075E54">
    <title>NEX Network - Chat Empresarial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* === COLORES ORIGINALES DE LA EMPRESA + ESTILO WHATSAPP === */
        :root {
            --primario: #075E54;
            --secundario: #128C7E;
            --fondo: #0F1920;
            --fondo-barra: #1A2A33;
            --burbuja-mia: #005C4B;
            --burbuja-otra: #1F2C34;
            --texto: #E9EDEF;
            --texto-claro: #8696A0;
            --borde: #2A3942;
            --resaltado: #25D366;
            --amarillo: #FFC107;
            --rojo: #FF4444;
            --azul: #34B7F1;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--fondo);
            color: var(--texto);
        }

        /* === PANTALLAS DE ACCESO (ORIGINAL + RECUPERACIÓN) === */
        .pantalla {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--fondo);
            padding: 20px;
            z-index: 999;
        }
        .caja-acceso {
            width: 100%;
            max-width: 400px;
            background: var(--fondo-barra);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--borde);
        }
        .logo-acceso { text-align: center; margin-bottom: 20px; }
        .logo-acceso h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: var(--resaltado);
        }
        .grupo { margin-bottom: 14px; }
        .grupo label {
            display: block;
            font-size: 14px;
            color: var(--texto-claro);
            margin-bottom: 6px;
        }
        .grupo input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--borde);
            background: var(--fondo);
            color: var(--texto);
            font-size: 15px;
        }
        .grupo input:focus { outline: none; border-color: var(--secundario); }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-principal { background: var(--primario); color: white; }
        .btn-principal:active { transform: scale(0.98); }
        .btn-secundario { background: transparent; color: var(--secundario); border: 1px solid var(--secundario); margin-top: 8px; }
        .btn-texto { background: none; border: none; color: var(--azul); font-size: 13px; cursor: pointer; margin-top: 5px; text-align: right; }
        .mensaje { font-size: 13px; margin: 10px 0; padding: 8px; border-radius: 6px; text-align: center; display: none; }
        .mensaje-exito { color: var(--resaltado); background: rgba(37,211,102,0.1); }
        .mensaje-error { color: var(--rojo); background: rgba(255,68,68,0.1); }
        .cambio-pantalla {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--texto-claro);
        }
        .cambio-pantalla span { color: var(--resaltado); cursor: pointer; font-weight: 500; }

        /* === BARRA DE CHAT Y PERFIL (ORIGINAL) === */
        .cabecera-chat {
            position: sticky;
            top: 0;
            background: var(--fondo-barra);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--borde);
            cursor: pointer;
        }
        .icono-canal, .item-chat-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--secundario);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .icono-canal img, .item-chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .info-canal h3, .item-chat-nombre { font-size: 16px; font-weight: 600; }
        .info-canal p, .item-chat-mensaje { font-size: 12px; color: var(--texto-claro); }

        /* === CAJA DE MENSAJES Y BURBUJAS (EXACTAMENTE COMO ANTES) === */
        .caja-mensajes {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232A3942' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .mensaje {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
        }
        .mensaje-propio { align-self: flex-end; }
        .mensaje-otro { align-self: flex-start; }
        .mensaje-autor { font-size: 11px; color: var(--texto-claro); margin: 0 10px; }
        .texto-mensaje {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .mensaje-propio .texto-mensaje {
            background: var(--burbuja-mia);
            border-bottom-right-radius: 2px;
        }
        .mensaje-otro .texto-mensaje {
            background: var(--burbuja-otra);
            border-bottom-left-radius: 2px;
        }
        .hora-mensaje {
            font-size: 10px;
            color: var(--texto-claro);
            align-self: flex-end;
            margin: 0 10px 2px;
        }
        .imagen-mensaje, .audio-mensaje {
            max-width: 220px;
            border-radius: 8px;
            margin-top: 4px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
        }

        /* === BARRA DE ESCRITURA (CON TODOS LOS BOTONES: TEXTO, EMOJI, IMAGEN, AUDIO) === */
        .barra-escribir {
            padding: 10px 15px;
            background: var(--fondo-barra);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            border-top: 1px solid var(--borde);
        }
        .boton-adjuntar, .boton-emoji, .boton-microfono, .btn-enviar {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--texto-claro);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .btn-enviar { background: var(--secundario); color: white; font-size: 16px; }
        .entrada-mensaje {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--borde);
            background: var(--fondo);
            color: var(--texto);
            font-size: 15px;
            resize: none;
            min-height: 40px;
            max-height: 100px;
        }

        /* === NAVEGACIÓN INFERIOR Y BOTÓN TIENDA (ORIGINAL RGB) === */
        .navegacion {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--fondo-barra);
            border-top: 1px solid var(--borde);
            padding: 10px 15px 18px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        .btn-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: transparent;
            border: none;
            color: var(--texto-claro);
            font-size: 11px;
            cursor: pointer;
            border-radius: 10px;
            padding: 5px 10px;
        }
        .btn-nav.activo { color: var(--resaltado); }
        .btn-nav span { font-size: 22px; }
        .btn-tienda {
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }
        .btn-tienda::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #ff0000, #ff9900, #00ff00, #0099ff, #9900ff, #ff0000);
            background-size: 400% 400%;
            border-radius: 12px;
            animation: brilloRGB 4s linear infinite;
            filter: blur(4px);
            opacity: 0.7;
            z-index: -1;
        }
        @keyframes brilloRGB {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === FUNCIONES NUEVAS SIN TOCAR LO ORIGINAL === */
        .btn-crear-grupo {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 55px; height: 55px;
            border-radius: 50%;
            background: var(--resaltado);
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37,211,102,0.3);
            z-index: 50;
        }
        .lista-chats { height: calc(100vh - 140px); overflow-y: auto; }
        .item-chat {
            display: flex; align-items: center; gap: 12px; padding: 15px;
            border-bottom: 1px solid var(--borde); cursor: pointer; transition: background 0.2s;
        }
        .item-chat:hover { background: rgba(255,255,255,0.03); }
        .item-chat-info { flex: 1; }
        .item-chat-hora { font-size: 11px; color: var(--texto-claro); flex-shrink: 0; }
        .foto-perfil {
            width: 50px; height: 50px; border-radius: 50%; background: var(--secundario);
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            overflow: hidden; cursor: pointer; flex-shrink: 0;
        }
        .foto-perfil img { width: 100%; height: 100%; object-fit: cover; }
        .cabecera-perfil {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: var(--fondo-barra); border-bottom: 1px solid var(--borde);
        }
        .config-grupo, .modal { display: none; }
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            align-items: center; justify-content: center; padding: 20px; z-index: 200;
        }
        .modal-contenido {
            background: var(--fondo-barra); border: 1px solid var(--borde); border-radius: 16px;
            padding: 20px; width: 100%; max-width: 400px;
        }
        .miembro-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid var(--borde);
        }
        .btn-eliminar {
            background: rgba(255,68,68,0.15); color: var(--rojo); border: 1px solid var(--rojo);
            padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
        }
        .seccion { display: none; height: 100%; flex-direction: column; }
        .seccion.activa { display: flex; }
        .oculto { display: none !important; }
    </style>
</head>
<body>
    <!-- PANTALLAS DE ACCESO -->
    <div class="pantalla" id="pantallaRegistro">
        <div class="caja-acceso">
            <div class="logo-acceso"><h2>NEX NETWORK</h2></div>
            <div class="grupo"><label>Tu nombre</label><input type="text" id="regApodo" placeholder="Ej: Juan Pérez" required></div>
            <div class="grupo"><label>Correo corporativo</label><input type="email" id="regCorreo" placeholder="tu@empresa.com" required></div>
            <div class="grupo"><label>Contraseña</label><input type="password" id="regClave" placeholder="Mínimo 6 caracteres" required></div>
            <div class="grupo"><label>Confirmar contraseña</label><input type="password" id="regConfirmar" placeholder="Repite tu contraseña" required></div>
            <div class="mensaje mensaje-error" id="errorRegistro"></div>
            <button class="btn btn-principal" onclick="registrarUsuario()">Crear cuenta</button>
            <div class="cambio-pantalla">¿Ya tienes cuenta? <span onclick="mostrarPantalla('login')">Iniciar sesión</span></div>
        </div>
    </div>
    <div class="pantalla" id="pantallaLogin">
        <div class="caja-acceso">
            <div class="logo-acceso"><h2>NEX NETWORK</h2></div>
            <div class="grupo"><label>Correo corporativo</label><input type="email" id="logCorreo" placeholder="tu@empresa.com" required></div>
            <div class="grupo"><label>Contraseña</label><input type="password" id="logClave" placeholder="Escribe tu contraseña" required></div>
            <button class="btn-texto" onclick="mostrarPantalla('recuperar')">¿Olvidaste tu contraseña?</button>
            <div class="mensaje mensaje-error" id="errorLogin"></div>
            <button class="btn btn-principal" onclick="iniciarSesion()">Ingresar</button>
            <div class="cambio-pantalla">¿No tienes cuenta? <span onclick="mostrarPantalla('registro')">Crear cuenta</span></div>
        </div>
    </div>
    <div class="pantalla" id="pantallaRecuperar">
        <div class="caja-acceso">
            <div class="logo-acceso"><h2>Recuperar contraseña</h2></div>
            <div class="grupo"><label>Tu correo</label><input type="email" id="recCorreo" placeholder="tu@empresa.com" required></div>
            <div class="mensaje mensaje-exito" id="mensajeRecuperar"></div>
            <div class="mensaje mensaje-error" id="errorRecuperar"></div>
            <button class="btn btn-principal" onclick="recuperarContrasena()">Cambiar contraseña</button>
            <button class="btn btn-secundario" onclick="mostrarPantalla('login')">Volver</button>
        </div>
    </div>

    <!-- SECCIÓN LISTA DE CHATS -->
    <div class="seccion" id="seccionLista">
        <div class="cabecera-perfil">
            <div class="foto-perfil" onclick="document.getElementById('subirFoto').click()">
                <span id="inicialFoto">U</span><img id="vistaFoto" style="display:none;">
            </div>
            <input type="file" id="subirFoto" accept="image/*" style="display:none;" onchange="cambiarFotoPerfil(this)">
            <div class="info-canal"><h3 id="nombreUsuarioCabecera">Usuario</h3><p>Disponible</p></div>
        </div>
        <div class="lista-chats" id="listaChats"></div>
        <button class="btn-crear-grupo" onclick="abrirModalCrearGrupo()">+</button>
    </div>

    <!-- SECCIÓN CHAT (ORIGINAL COMPLETA) -->
    <div class="seccion" id="seccionChat">
        <div class="cabecera-chat">
            <button class="boton-adjuntar" onclick="volverALista()">←</button>
            <div class="icono-canal" id="avatarChat">💬</div>
            <div class="info-canal" onclick="abrirConfigGrupo()">
                <h3 id="nombreChat">CANAL GENERAL</h3>
                <p id="infoChat">Conectado</p>
            </div>
        </div>
        <div class="caja-mensajes" id="cajaMensajes"></div>
        <div class="barra-escribir">
            <input type="file" id="subirImagen" accept="image/*" style="display:none;" onchange="subirImagen(this)">
            <button class="boton-adjuntar" onclick="document.getElementById('subirImagen').click()">📷</button>
            <button class="boton-emoji" id="btnEmoji">😀</button>
            <textarea id="entradaMensaje" class="entrada-mensaje" placeholder="Escribe un mensaje..." onkeydown="enviarConEnter(event)"></textarea>
            <button class="boton-microfono" id="btnAudio">🎤</button>
            <button class="btn-enviar" onclick="enviarMensaje()">➤</button>
        </div>
    </div>

    <!-- MODALES DE GRUPOS -->
    <div class="modal" id="modalCrearGrupo">
        <div class="modal-contenido">
            <h3>Crear grupo</h3>
            <div class="grupo"><label>Nombre del grupo</label><input type="text" id="nombreGrupo" required></div>
            <div class="grupo"><label>Descripción</label><input type="text" id="descGrupo"></div>
            <div style="display:flex;gap:10px;margin-top:15px;">
                <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
                <button class="btn btn-principal" onclick="crearGrupo()">Crear</button>
            </div>
        </div>
    </div>
    <div class="modal" id="modalUnirse">
        <div class="modal-contenido">
            <h3>Unirse a grupo</h3>
            <div class="grupo"><label>Código de invitación</label><input type="text" id="codigoGrupo" required></div>
            <div style="display:flex;gap:10px;margin-top:15px;">
                <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
                <button class="btn btn-principal" onclick="unirseGrupo()">Unirme</button>
            </div>
        </div>
    </div>

    <!-- NAVEGACIÓN -->
    <nav class="navegacion" id="navegacion" style="display:none;">
        <button class="btn-nav activo" onclick="cambiarSeccion('lista')"><span>💬</span>Chats</button>
        <button class="btn-nav" onclick="abrirModalUnirse()"><span>➕</span>Unirme</button>
        <button class="btn-nav btn-tienda" onclick="window.location.href='tienda.html'"><span>🛒</span>Tienda</button>
        <button class="btn-nav" onclick="cerrarSesion()"><span>🚪</span>Salir</button>
    </nav>

    <script>
        // === PROTECCIÓN SIN ERRORES EN APK ===
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || e.key === 'F12') e.preventDefault();
        });

        // === SEGURIDAD Y ALMACENAMIENTO ===
        function protegerClave(c) {let r=0;for(let i=0;i<c.length;i++)r=((r<<5)-r)+c.charCodeAt(i);return r.toString(16);}
        let usuarios = JSON.parse(localStorage.getItem('usuariosNEX')) || [];
        let sesion = JSON.parse(localStorage.getItem('sesionNEX')) || null;
        let grupos = JSON.parse(localStorage.getItem('gruposNEX')) || [];
        let mensajes = JSON.parse(localStorage.getItem('mensajesNEX')) || [];
        let chatActivo = null;

        // === INICIO ===
        window.onload = () => sesion ? mostrarApp() : mostrarPantalla('login');
        function mostrarPantalla(t) {
            document.querySelectorAll('.pantalla').forEach(p=>p.style.display='none');
            document.getElementById('navegacion').style.display='none';
            document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('activa'));
            if(t) document.getElementById(`pantalla${t.charAt(0).toUpperCase()+t.slice(1)}`).style.display='flex';
        }
        function mostrarApp() {
            mostrarPantalla();
            document.getElementById('navegacion').style.display='flex';
            document.getElementById('nombreUsuarioCabecera').textContent = sesion.apodo;
            document.getElementById('inicialFoto').textContent = sesion.apodo[0].toUpperCase();
            if(sesion.foto) { document.getElementById('vistaFoto').src = sesion.foto; document.getElementById('vistaFoto').style.display='block'; document.getElementById('inicialFoto').style.display='none'; }
            actualizarListaChats();
            cambiarSeccion('lista');
        }
        function cambiarSeccion(t) {
            document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('activa'));
            document.querySelectorAll('.btn-nav').forEach(b=>b.classList.remove('activo'));
            document.getElementById(`seccion${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.add('activa');
            event?.target?.closest('.btn-nav')?.classList.add('activo');
        }
        function volverALista() { chatActivo=null; cambiarSeccion('lista'); }

        // === REGISTRO, SESIÓN Y RECUPERACIÓN (ORIGINAL) ===
        function registrarUsuario() {
            let a = document.getElementById('regApodo').value.trim(), c = document.getElementById('regCorreo').value.trim().toLowerCase(),
                p = document.getElementById('regClave').value, pc = document.getElementById('regConfirmar').value,
                err = document.getElementById('errorRegistro');
            if(!a||!c||p.length<6) {err.textContent='Completa todos los campos';err.style.display='block';return;}
            if(p!==pc) {err.textContent='Contraseñas no coinciden';err.style.display='block';return;}
            if(usuarios.find(u=>u.correo===c)) {err.textContent='Correo ya registrado';err.style.display='block';return;}
            usuarios.push({id:Date.now().toString(),apodo:a,correo:c,clave:protegerClave(p),foto:null,tipo:'usuario'});
            localStorage.setItem('usuariosNEX',JSON.stringify(usuarios));
            alert('Cuenta creada ✅'); mostrarPantalla('login');
        }
        function iniciarSesion() {
            let c = document.getElementById('logCorreo').value.trim().toLowerCase(), p = document.getElementById('logClave').value,
                err = document.getElementById('errorLogin'), u = usuarios.find(x=>x.correo===c&&x.clave===protegerClave(p));
            if(!u) {err.textContent='Datos incorrectos';err.style.display='block';return;}
            sesion = u; localStorage.setItem('sesionNEX',JSON.stringify(sesion)); mostrarApp();
        }
        function cerrarSesion() {if(confirm('¿Cerrar sesión?')) {sesion=null;localStorage.removeItem('sesionNEX');mostrarPantalla('login');}}
        function recuperarContrasena() {
            let c = document.getElementById('recCorreo').value.trim().toLowerCase(), u = usuarios.find(x=>x.correo===c),
                msg = document.getElementById('mensajeRecuperar'), err = document.getElementById('errorRecuperar');
            if(!u) {err.textContent='Correo no registrado';err.style.display='block';return;}
            let nueva = prompt('Escribe tu nueva contraseña (mínimo 6 caracteres):');
            if(!nueva||nueva.length<6) {err.textContent='Contraseña muy corta';err.style.display='block';return;}
            u.clave = protegerClave(nueva); localStorage.setItem('usuariosNEX',JSON.stringify(usuarios));
            msg.textContent='Contraseña actualizada ✅'; msg.style.display='block'; setTimeout(()=>mostrarPantalla('login'),2000);
        }

        // === FOTO DE PERFIL ===
        function cambiarFotoPerfil(i) {
            let a = i.files[0]; if(!a) return;
            let r = new FileReader(); r.onload = e => {
                sesion.foto = e.target.result;
                let idx = usuarios.findIndex(x=>x.id===sesion.id); if(idx!=-1) usuarios[idx].foto=e.target.result;
                localStorage.setItem('usuariosNEX',JSON.stringify(usuarios)); localStorage.setItem('sesionNEX',JSON.stringify(sesion));
                mostrarApp();
            }; r.readAsDataURL(a);
        }

        // === GESTIÓN DE GRUPOS ===
        function abrirModalCrearGrupo() {document.getElementById('modalCrearGrupo').style.display='flex';}
        function abrirModalUnirse() {document.getElementById('modalUnirse').style.display='flex';}
        function cerrarModal() {document.querySelectorAll('.modal').forEach(m=>m.style.display='none');}
        function codigoInv() {return Math.random().toString(36).substring(2,10).toUpperCase();}
        function crearGrupo() {
            let n = document.getElementById('nombreGrupo').value.trim(), d = document.getElementById('descGrupo').value.trim();
            if(!n) {alert('Escribe el nombre del grupo');return;}
            let g = {id:Date.now().toString(),nombre:n,desc:d,codigo:codigoInv(),creador:sesion.id,miembros:[{id:sesion.id,rol:'admin'}]};
            grupos.push(g); localStorage.setItem('gruposNEX',JSON.stringify(grupos)); cerrarModal(); actualizarListaChats();
            alert(`Grupo creado! Código: ${g.codigo}`);
        }
        function unirseGrupo() {
            let c = document.getElementById('codigoGrupo').value.trim().toUpperCase(), g = grupos.find(x=>x.codigo===c);
            if(!g) {alert('Código inválido');return;}
            if(g.miembros.find(x=>x.id===sesion.id)) {alert('Ya estás en este grupo');return;}
            g.miembros.push({id:sesion.id,rol:'miembro'}); localStorage.setItem('gruposNEX',JSON.stringify(grupos)); cerrarModal(); actualizarListaChats();
            alert(`Te uniste a ${g.nombre}`);
        }
        function eliminarMiembro(gid, mid) {
            let g = grupos.find(x=>x.id===gid); if(!g||g.creador!==sesion.id) {alert('No tienes permiso');return;}
            if(mid===g.creador) {alert('No puedes eliminar al creador');return;}
            if(confirm('¿Eliminar este miembro?')) {
                g.miembros = g.miembros.filter(x=>x.id!==mid); localStorage.setItem('gruposNEX',JSON.stringify(grupos));
                alert('Miembro eliminado ✅');
            }
        }
        function abrirConfigGrupo() { if(!chatActivo) return; alert(`Código de invitación: ${chatActivo.codigo}\nCreador: ${usuarios.find(x=>x.id===chatActivo.creador)?.apodo}`); }

        // === LISTA DE CHATS ===
        function actualizarListaChats() {
            let l = document.getElementById('listaChats'); l.innerHTML='';
            let misG = grupos.filter(g=>g.miembros.find(m=>m.id===sesion.id));
            misG.forEach(g=>{
                let item = document.createElement('div'); item.className='item-chat'; item.onclick=()=>abrirChat(g);
                item.innerHTML = `<div class="item-chat-avatar">👥</div><div class="item-chat-info"><div class="item-chat-nombre">${g.nombre}</div><div class="item-chat-mensaje">Código: ${g.codigo}</div></div>`;
                l.appendChild(item);
            });
            if(misG.length===0) l.innerHTML='<div style="padding:30px;text-align:center;color:var(--texto-claro);">Crea un grupo o únete con un código</div>';
        }

        // === CHAT Y MENSAJES (FUNCIONAMIENTO ORIGINAL COMPLETO) ===
        function abrirChat(g) {
            chatActivo = g; document.getElementById('nombreChat').textContent = g.nombre;
            document.getElementById('infoChat').textContent = `${g.miembros.length} miembros`;
            cambiarSeccion('chat'); actualizarChat();
        }
        function enviarMensaje() {
            let t = document.getElementById('entradaMensaje').value.trim(); if(!t||!chatActivo) return;
            mensajes.push({
                id:Date.now().toString(),grupo:chatActivo.id,autor:sesion.id,nombre:sesion.apodo,texto:t,
                hora:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})
            });
            localStorage.setItem('mensajesNEX',JSON.stringify(mensajes));
            document.getElementById('entradaMensaje').value=''; actualizarChat();
        }
        function enviarConEnter(e) { if(e.key==='Enter'&&!e.shiftKey) {e.preventDefault();enviarMensaje();} }
        function subirImagen(i) {
            let a = i.files[0]; if(!a||!chatActivo) return;
            let r = new FileReader(); r.onload = e => {
                mensajes.push({
                    id:Date.now().toString(),grupo:chatActivo.id,autor:sesion.id,nombre:sesion.apodo,
                    imagen:e.target.result,hora:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})
                });
                localStorage.setItem('mensajesNEX',JSON.stringify(mensajes)); actualizarChat();
            }; r.readAsDataURL(a);
        }
        // Audio (funcional como en la versión original)
        let grabadora = null;
        document.getElementById('btnAudio').addEventListener('mousedown', ()=>{
            if(!chatActivo) return;
            navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
                grabadora = new MediaRecorder(s); let datos=[];
                grabadora.ondataavailable = e=>datos.push(e.data);
                grabadora.onstop = ()=>{
                    let blob = new Blob(datos,{type:'audio/webm'}), url = URL.createObjectURL(blob);
                    mensajes.push({
                        id:Date.now().toString(),grupo:chatActivo.id,autor:sesion.id,nombre:sesion.apodo,
                        audio:url,hora:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})
                    });
                    localStorage.setItem('mensajesNEX',JSON.stringify(mensajes)); actualizarChat();
                };
                grabadora.start();
            });
        });
        document.getElementById('btnAudio').addEventListener('mouseup', ()=>{ if(grabadora) grabadora.stop(); grabadora=null; });
        // Emojis
        document.getElementById('btnEmoji').addEventListener('click', ()=>{
            let emojis = ['😀😂😍👍🔥💬📷🎵📢⚠️✅❌'];
            document.getElementById('entradaMensaje').value += emojis[Math.floor(Math.random()*emojis.length)];
        });
        function actualizarChat() {
            if(!chatActivo) return;
            let c = document.getElementById('cajaMensajes'); c.innerHTML='';
            let m = mensajes.filter(x=>x.grupo===chatActivo.id);
            m.forEach(msg=>{
                let mio = msg.autor===sesion.id, div = document.createElement('div');
                div.className = `mensaje ${mio?'mensaje-propio':'mensaje-otro'}`;
                if(!mio) div.innerHTML += `<div class="mensaje-autor">${msg.nombre}</div>`;
                if(msg.texto) div.innerHTML += `<div class="texto-mensaje">${msg.texto}</div>`;
                if(msg.imagen) div.innerHTML += `<img src="${msg.imagen}" class="imagen-mensaje">`;
                if(msg.audio) div.innerHTML += `<audio controls class="audio-mensaje" src="${msg.audio}">`;
                div.innerHTML += `<div class="hora-mensaje">${msg.hora}</div>`;
                c.appendChild(div);
            });
            c.scrollTop = c.scrollHeight;
        }
    </script>
</body>
</html>
