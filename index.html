<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#17212b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NEX Network - Chat Empresarial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primario: #075E54;
            --secundario: #128C7E;
            --fondo: #0F1920;
            --fondo-chat: #0F1920;
            --burbuja-mia: #005C4B;
            --burbuja-otra: #1F2C34;
            --texto: #E9EDEF;
            --texto-claro: #8696A0;
            --borde: #2A3942;
            --resaltado: #25D366;
            --amarillo: #FFC107;
            --rojo: #FF4444;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--fondo);
            color: var(--texto);
        }

        /* PANTALLAS DE ACCESO */
        .pantalla {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            background: var(--fondo);
            padding: 20px;
        }
        .caja-acceso {
            width: 100%;
            max-width: 400px;
            background: #1A2A33;
            border-radius: 16px;
            padding: 30px 25px;
            border: 1px solid var(--borde);
        }
        .logo-acceso { text-align: center; margin-bottom: 25px; }
        .logo-acceso h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: var(--resaltado);
            margin-bottom: 5px;
        }
        .grupo { margin-bottom: 16px; }
        .grupo label {
            display: block;
            font-size: 14px;
            color: var(--texto-claro);
            margin-bottom: 6px;
        }
        .grupo input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid var(--borde);
            background: var(--fondo);
            color: var(--texto);
            font-size: 15px;
        }
        .grupo input:focus { outline: none; border-color: var(--secundario); }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-principal { background: var(--primario); color: white; }
        .btn-principal:active { transform: scale(0.98); }
        .btn-secundario { background: transparent; color: var(--secundario); border: 1px solid var(--secundario); margin-top: 10px; }
        .mensaje-error {
            color: var(--rojo);
            font-size: 13px;
            margin: 10px 0;
            display: none;
            text-align: center;
            padding: 8px;
            background: rgba(255,68,68,0.1);
            border-radius: 6px;
        }
        .cambio-pantalla {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--texto-claro);
        }
        .cambio-pantalla span { color: var(--resaltado); cursor: pointer; font-weight: 500; }

        /* BARRA DE NAVEGACIÓN INFERIOR */
        .navegacion {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1A2A33;
            border-top: 1px solid var(--borde);
            padding: 10px 15px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        .btn-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--texto-claro);
            font-size: 11px;
            cursor: pointer;
            border-radius: 10px;
            padding: 6px 10px;
        }
        .btn-nav.activo { color: var(--resaltado); }
        .btn-nav span { font-size: 22px; }
        .btn-admin { color: var(--amarillo); display: none; }

        /* BOTÓN TIENDA CON EFECTO RGB */
        .btn-tienda {
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }
        .btn-tienda::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #ff0000, #ff9900, #00ff00, #0099ff, #9900ff, #ff0000);
            background-size: 400% 400%;
            border-radius: 12px;
            animation: brilloRGB 4s linear infinite;
            filter: blur(4px);
            opacity: 0.7;
            z-index: -1;
        }
        @keyframes brilloRGB {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CONTENIDO DEL CHAT */
        .contenedor-principal {
            height: calc(100vh - 80px);
            padding-bottom: 10px;
            overflow-y: auto;
            display: none;
        }
        .seccion { display: none; height: 100%; }
        .seccion.activa { display: flex; flex-direction: column; }

        .cabecera-chat {
            position: sticky;
            top: 0;
            background: #1A2A33;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--borde);
        }
        .icono-canal {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--secundario);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .info-canal h3 { font-size: 16px; font-weight: 600; }
        .info-canal p { font-size: 12px; color: var(--texto-claro); }

        .caja-mensajes {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232A3942' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .mensaje {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
        }
        .mensaje-propio { align-self: flex-end; }
        .mensaje-otro { align-self: flex-start; }
        .texto-mensaje {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }
        .mensaje-propio .texto-mensaje {
            background: var(--burbuja-mia);
            border-bottom-right-radius: 2px;
        }
        .mensaje-otro .texto-mensaje {
            background: var(--burbuja-otra);
            border-bottom-left-radius: 2px;
        }
        .hora-mensaje {
            font-size: 10px;
            color: var(--texto-claro);
            align-self: flex-end;
            margin: 0 10px 2px;
        }
        .imagen-mensaje {
            max-width: 220px;
            border-radius: 8px;
            margin-top: 4px;
        }

        /* BARRA DE ESCRITURA */
        .barra-escribir {
            padding: 10px 15px;
            background: #1A2A33;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            border-top: 1px solid var(--borde);
        }
        .boton-adjuntar, .boton-emoji, .boton-microfono {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--texto-claro);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .entrada-mensaje {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--borde);
            background: var(--fondo);
            color: var(--texto);
            font-size: 15px;
            resize: none;
            min-height: 40px;
        }
        .btn-enviar {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--secundario);
            color: white;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* PANEL ADMIN */
        .panel-admin {
            padding: 20px;
        }
        .panel-admin h2 {
            color: var(--amarillo);
            font-size: 18px;
            margin-bottom: 15px;
        }
        .usuario-item {
            padding: 12px;
            background: #1A2A33;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--borde);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-admin-accion {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-peligro { background: rgba(255,68,68,0.15); color: var(--rojo); border: 1px solid var(--rojo); }
        .btn-exito { background: rgba(37,211,102,0.15); color: var(--resaltado); border: 1px solid var(--resaltado); }
    </style>
</head>
<body>
    <!-- PANTALLAS DE ACCESO -->
    <div class="pantalla" id="pantallaRegistro">
        <div class="caja-acceso">
            <div class="logo-acceso">
                <h2>NEX NETWORK</h2>
                <p>Chat Empresarial</p>
            </div>
            <div class="grupo">
                <label>Tu nombre</label>
                <input type="text" id="regApodo" placeholder="Ej: Juan_Operaciones" required>
            </div>
            <div class="grupo">
                <label>Correo corporativo</label>
                <input type="email" id="regCorreo" placeholder="tu@empresa.com" required>
            </div>
            <div class="grupo">
                <label>Contraseña</label>
                <input type="password" id="regClave" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="grupo">
                <label>Confirmar contraseña</label>
                <input type="password" id="regConfirmar" placeholder="Repite la contraseña" required>
            </div>
            <div class="mensaje-error" id="errorRegistro"></div>
            <button class="btn btn-principal" onclick="registrarUsuario()">Crear cuenta</button>
            <div class="cambio-pantalla">¿Ya tienes cuenta? <span onclick="mostrarPantalla('login')">Iniciar sesión</span></div>
        </div>
    </div>

    <div class="pantalla" id="pantallaLogin">
        <div class="caja-acceso">
            <div class="logo-acceso">
                <h2>NEX NETWORK</h2>
                <p>Bienvenido de nuevo</p>
            </div>
            <div class="grupo">
                <label>Correo corporativo</label>
                <input type="email" id="logCorreo" placeholder="tu@empresa.com" required>
            </div>
            <div class="grupo">
                <label>Contraseña</label>
                <input type="password" id="logClave" placeholder="Escribe tu contraseña" required>
            </div>
            <div class="mensaje-error" id="errorLogin"></div>
            <button class="btn btn-principal" onclick="iniciarSesion()">Ingresar</button>
            <div class="cambio-pantalla">¿No tienes cuenta? <span onclick="mostrarPantalla('registro')">Crear cuenta</span></div>
        </div>
    </div>

    <!-- NAVEGACIÓN -->
    <nav class="navegacion" id="navegacionPrincipal" style="display: none;">
        <button class="btn-nav activo" onclick="cambiarSeccion('chat')">
            <span>💬</span> Chat
        </button>
        <button class="btn-nav btn-tienda" onclick="window.location.href='tienda.html'">
            <span>🛒</span> Tienda
        </button>
        <button class="btn-nav btn-admin" id="botonAdmin" onclick="cambiarSeccion('admin')">
            <span>👑</span> Admin
        </button>
        <button class="btn-nav" onclick="cerrarSesion()">
            <span>🚪</span> Salir
        </button>
    </nav>

    <!-- CONTENIDO -->
    <div class="contenedor-principal" id="contenidoPrincipal">
        <div class="seccion activa" id="seccionChat">
            <div class="cabecera-chat">
                <div class="icono-canal">💬</div>
                <div class="info-canal">
                    <h3>CANAL GENERAL</h3>
                    <p>Conectado: <span id="nombreUsuario"></span></p>
                </div>
            </div>
            <div class="caja-mensajes" id="cajaMensajes"></div>
            <div class="barra-escribir">
                <input type="file" id="entradaImagen" accept="image/*" style="display: none;" onchange="subirImagen(this)">
                <button class="boton-adjuntar" onclick="document.getElementById('entradaImagen').click()">📷</button>
                <button class="boton-emoji">😀</button>
                <textarea id="entradaMensaje" class="entrada-mensaje" placeholder="Escribe un mensaje..." onkeydown="enviarConEnter(event)"></textarea>
                <button class="boton-microfono">🎤</button>
                <button class="btn-enviar" onclick="enviarMensaje()">➤</button>
            </div>
        </div>

        <div class="seccion" id="seccionAdmin">
            <div class="panel-admin">
                <h2>👑 PANEL DE ADMINISTRACIÓN</h2>
                <h3 style="margin: 15px 0 10px;">Usuarios registrados</h3>
                <div class="lista-usuarios" id="listaUsuarios"></div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
                    <button class="btn-admin-accion btn-peligro" onclick="confirmarBorrarTodoChat()">Limpiar chat</button>
                    <button class="btn-admin-accion btn-exito" onclick="respaldarDatos()">Respaldar datos</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === BLOQUEO DE SEGURIDAD AJUSTADO PARA APK CREADOR ===
        // Se eliminó la detección excesiva que causaba el cierre
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || e.key === 'F12') e.preventDefault();
        });

        // === CREDENCIALES ADMIN CIFRADAS ===
        const ADMIN_CORREO_COD = 'YWRtaW5AbmV4bmV0d29yay5jb20=';
        const ADMIN_CLAVE_COD = 'dHVfY2xhdmVfc2VjcmV0YV9hZG1pbl8yMDI2';
        function obtenerCredenciales() { return { correo: atob(ADMIN_CORREO_COD), clave: atob(ADMIN_CLAVE_COD) }; }

        // === ALMACENAMIENTO ===
        function protegerClave(clave) {
            let codigo = 0;
            for(let i = 0; i < clave.length; i++) codigo = ((codigo << 5) - codigo) + clave.charCodeAt(i);
            return codigo.toString(16);
        }
        let usuarios = JSON.parse(localStorage.getItem('usuariosChatNEX')) || [];
        let sesionActiva = JSON.parse(localStorage.getItem('sesionActivaNEX')) || null;
        let mensajes = JSON.parse(localStorage.getItem('mensajesChatNEX')) || [];

        // === INICIO ===
        window.addEventListener('load', () => {
            sesionActiva ? mostrarAplicacion() : mostrarPantalla('login');
        });
        function mostrarPantalla(tipo) {
            document.getElementById('pantallaRegistro').style.display = tipo === 'registro' ? 'flex' : 'none';
            document.getElementById('pantallaLogin').style.display = tipo === 'login' ? 'flex' : 'none';
            document.getElementById('navegacionPrincipal').style.display = 'none';
            document.getElementById('contenidoPrincipal').style.display = 'none';
        }
        function mostrarAplicacion() {
            mostrarPantalla('ninguna');
            document.getElementById('navegacionPrincipal').style.display = 'flex';
            document.getElementById('contenidoPrincipal').style.display = 'block';
            document.getElementById('nombreUsuario').textContent = sesionActiva.apodo;
            if (sesionActiva.tipo === 'admin') document.getElementById('botonAdmin').style.display = 'flex';
            actualizarChat();
            sesionActiva.tipo === 'admin' && cargarListaUsuariosAdmin();
        }
        function cambiarSeccion(nombre) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('activo'));
            document.getElementById(`seccion${nombre.charAt(0).toUpperCase() + nombre.slice(1)}`).classList.add('activa');
            event.target.closest('.btn-nav').classList.add('activo');
        }

        // === REGISTRO Y SESIÓN ===
        function registrarUsuario() {
            const apodo = document.getElementById('regApodo').value.trim();
            const correo = document.getElementById('regCorreo').value.trim().toLowerCase();
            const clave = document.getElementById('regClave').value;
            const confirmar = document.getElementById('regConfirmar').value;
            const error = document.getElementById('errorRegistro');
            if (!apodo || !correo || clave.length < 6) { error.textContent = 'Completa todos los campos (mínimo 6 caracteres)'; error.style.display = 'block'; return; }
            if (clave !== confirmar) { error.textContent = 'Las contraseñas no coinciden'; error.style.display = 'block'; return; }
            if (usuarios.find(u => u.correo === correo)) { error.textContent = 'Este correo ya está registrado'; error.style.display = 'block'; return; }
            usuarios.push({
                id: Date.now().toString(), apodo, correo, tipo: 'usuario',
                claveProtegida: protegerClave(clave), color: `hsl(${Math.random()*360},70%,55%)`
            });
            localStorage.setItem('usuariosChatNEX', JSON.stringify(usuarios));
            mostrarPantalla('login');
            alert('Cuenta creada correctamente ✅');
        }
        function iniciarSesion() {
            const correo = document.getElementById('logCorreo').value.trim().toLowerCase();
            const clave = document.getElementById('logClave').value;
            const error = document.getElementById('errorLogin');
            const credenciales = obtenerCredenciales();
            let usuario = usuarios.find(u => u.correo === correo && u.claveProtegida === protegerClave(clave));
            if (correo === credenciales.correo && clave === credenciales.clave) {
                let cuentaAdmin = usuarios.find(u => u.correo === credenciales.correo);
                if (!cuentaAdmin) {
                    cuentaAdmin = { id: Date.now().toString(), apodo: 'ADMIN NEX', correo: credenciales.correo, tipo: 'admin', claveProtegida: protegerClave(credenciales.clave), color: '#FFC107' };
                    usuarios.push(cuentaAdmin);
                } else cuentaAdmin.tipo = 'admin';
                localStorage.setItem('usuariosChatNEX', JSON.stringify(usuarios));
                usuario = cuentaAdmin;
            }
            if (!usuario) { error.textContent = 'Datos incorrectos'; error.style.display = 'block'; return; }
            sesionActiva = usuario;
            localStorage.setItem('sesionActivaNEX', JSON.stringify(sesionActiva));
            mostrarAplicacion();
        }
        function cerrarSesion() {
            if (confirm('¿Cerrar sesión?')) { sesionActiva = null; localStorage.removeItem('sesionActivaNEX'); mostrarPantalla('login'); }
        }

        // === CHAT ===
        function enviarMensaje() {
            const texto = document.getElementById('entradaMensaje').value.trim();
            if (!texto) return;
            mensajes.push({
                id: Date.now().toString(), autorId: sesionActiva.id, autorNombre: sesionActiva.apodo,
                texto, hora: new Date().toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'})
            });
            localStorage.setItem('mensajesChatNEX', JSON.stringify(mensajes));
            document.getElementById('entradaMensaje').value = '';
            actualizarChat();
        }
        function enviarConEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); } }
        function subirImagen(input) {
            const archivo = input.files[0]; if (!archivo) return;
            const lector = new FileReader();
            lector.onload = e => {
                mensajes.push({
                    id: Date.now().toString(), autorId: sesionActiva.id, autorNombre: sesionActiva.apodo,
                    imagen: e.target.result, hora: new Date().toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'})
                });
                localStorage.setItem('mensajesChatNEX', JSON.stringify(mensajes));
                actualizarChat();
            };
            lector.readAsDataURL(archivo);
        }
        function actualizarChat() {
            const caja = document.getElementById('cajaMensajes'); caja.innerHTML = '';
            mensajes.forEach(msg => {
                const esMio = msg.autorId === sesionActiva.id;
                const div = document.createElement('div'); div.className = `mensaje ${esMio ? 'mensaje-propio' : 'mensaje-otro'}`;
                if (msg.texto) div.innerHTML += `<div class="texto-mensaje">${msg.texto}</div>`;
                if (msg.imagen) div.innerHTML += `<img src="${msg.imagen}" class="imagen-mensaje">`;
                div.innerHTML += `<div class="hora-mensaje">${msg.hora}</div>`;
                caja.appendChild(div);
            });
            caja.scrollTop = caja.scrollHeight;
        }

        // === ADMIN ===
        function cargarListaUsuariosAdmin() {
            const lista = document.getElementById('listaUsuarios'); lista.innerHTML = '';
            usuarios.forEach(u => {
                const div = document.createElement('div'); div.className = 'usuario-item';
                div.innerHTML = `<div><div class="usuario-nombre">${u.apodo}</div><div class="usuario-correo">${u.correo} | ${u.tipo}</div></div>`;
                lista.appendChild(div);
            });
        }
        function confirmarBorrarTodoChat() { if(confirm('¿Borrar todo el chat?')) { mensajes = []; localStorage.setItem('mensajesChatNEX', JSON.stringify(mensajes)); actualizarChat(); } }
        function respaldarDatos() { alert('Datos guardados correctamente en el dispositivo ✅'); }
    </script>
</body>
</html>
